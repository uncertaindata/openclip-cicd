name: ML Pipeline

# Triggers
on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'configs/**'
      - 'pipeline.sh'
      - 'Dockerfile'

  # Manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      run_name:
        description: 'Name for this training run'
        required: false
        default: ''

jobs:
  train-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build Docker image (skips if unchanged)
        run: |
          IMAGE_EXISTS=$(docker images -q openclip-cicd 2>/dev/null)
          DOCKERFILE_CHANGED=$(git diff HEAD~1 --name-only 2>/dev/null | grep -c "Dockerfile\|open_clip" || true)
          if [ -z "$IMAGE_EXISTS" ] || [ "$DOCKERFILE_CHANGED" -gt 0 ]; then
            echo "Building image..."
            docker build -t openclip-cicd .
          else
            echo "Image exists and Dockerfile unchanged — skipping build"
          fi

      - name: Run pipeline
        run: |
          docker run --gpus all \
            --shm-size=8g \
            -v /home/sumit/sumit-cicd-data-openclip-val:/home/sumit/sumit-cicd-data-openclip-val \
            -w /home/sumit/sumit-cicd-data-openclip-val \
            --entrypoint /bin/bash openclip-cicd \
            pipeline.sh
